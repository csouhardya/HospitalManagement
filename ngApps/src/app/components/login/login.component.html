<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-circle">+</div>
      <h2>HospitalCare Login</h2>
      <p>Sign in to continue to the hospital dashboard</p>
    </div>

    <form>
      <div class="form-group">
        <label>User Name</label>
        <input name="userName" [(ngModel)]="userName" placeholder="Enter username">
      </div>

      <div class="form-group">
        <label>Password</label>
        <input name="password" type="password" [(ngModel)]="password" placeholder="Enter password">
      </div>
      <br>
      <button type="button" class="login-btn" (click)="login()">Login</button>
    </form>

    <p class="error-text">{{error}}</p>
  </div>
</div>
